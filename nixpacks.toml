[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_pgsql", "php83Extensions.pgsql", "php83Extensions.mbstring", "php83Extensions.exif", "php83Extensions.bcmath", "php83Extensions.gd", "php83Extensions.intl", "php83Extensions.zip", "php83Extensions.opcache", "php83Extensions.fileinfo", "php83Extensions.openssl", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.ctype", "php83Extensions.json", "php83Extensions.session", "php83Extensions.dom", "php83Extensions.xmlwriter", "php83Extensions.xmlreader", "php83Extensions.simplexml", "php83Extensions.pcntl", "php83Extensions.posix", "php83Extensions.sodium", "php83Extensions.redis", "php83Extensions.pdo", "php83Extensions.iconv", "php83Extensions.filter", "php83Extensions.ctype", "nodejs_20", "npm-9_x"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci && npm run build",
    "php artisan optimize",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
    "php artisan storage:link || true"
]

[phases.deploy]
startCommand = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT}"
